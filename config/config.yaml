# TrendRadar 配置文件
# 更多配置项说明请参考项目文档

# 基本信息
app:
  name: "TrendRadar"
  version: "6.10.0"

# 用户ID（可自定义，用于标识）
user_id: "bilibili_monitor"

# 数据源配置 - 关闭公共热点，只监控RSS
platforms:
  enabled: false  # 关闭所有公共平台热点

# RSS 订阅配置 - 核心功能
rss:
  enabled: true
  timeout: 15
  freshness_filter:
    enabled: true
    max_age_days: 7  # 只获取最近7天的内容
  feeds:
    - id: "bilibili_user_17173"
      name: "17173妖气山"
      url: "https://rsshub.app/bilibili/user/dynamic/680417"
      enabled: true
    - id: "bilibili_user_gamex"
      name: "游戏X博士"
      url: "https://rsshub.app/bilibili/user/dynamic/356798697"
      enabled: true
    - id: "bilibili_user_blackmyth"
      name: "黑神话"
      url: "https://rsshub.app/bilibili/user/dynamic/642389251"
      enabled: true

# 推送显示配置 - 只显示RSS内容
display:
  region_order:
    - rss
  regions:
    hotlist: false      # 关闭热点榜单
    new_items: false    # 关闭新增项目
    rss: true           # 开启RSS区域
    standalone: false
    ai_analysis: false  # 关闭AI分析（除非你需要）

# 通知渠道配置（推送将使用你配置的 Webhook）
notification:
  mode: "all"           # 所有匹配的内容都推送
  batch_size: 10        # 每次最多推送10条

# 日志级别
log:
  level: "INFO"

# 时区设置
timezone: "Asia/Shanghai"
